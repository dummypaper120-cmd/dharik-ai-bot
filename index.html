<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHARIK V17.9 - TELEGRAM LEVELS</title>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 420px; background: #111; border: 2px solid #ffcc00; border-radius: 20px; padding: 15px; box-shadow: 0 0 40px rgba(255, 204, 0, 0.4); margin-top: 10px; border-bottom: 5px solid #ffcc00; }
        .header { text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .header h1 { color: #ffcc00; margin: 0; font-size: 26px; text-transform: uppercase; text-shadow: 0 0 15px #ffcc00; }
        .prediction-card { background: linear-gradient(145deg, #1a1a1a, #0a0a0a); border-radius: 15px; padding: 25px; text-align: center; border: 1px solid #333; margin: 15px 0; }
        .res-val { font-size: 60px; font-weight: 900; margin: 5px 0; letter-spacing: 3px; }
        .big { color: #facc15; text-shadow: 0 0 30px rgba(250, 204, 21, 0.7); }
        .small { color: #60a5fa; text-shadow: 0 0 30px rgba(96, 165, 250, 0.7); }
        .timer-bar { width: 100%; height: 10px; background: #222; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .timer-fill { width: 100%; height: 100%; background: #ffcc00; transition: width 1s linear; }
        .history-list { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        .history-list th { color: #ffcc00; padding: 12px; border-bottom: 2px solid #222; background: #1a1a1a; }
        .history-list td { padding: 10px; border-bottom: 1px solid #222; text-align: center; font-weight: bold; }
        .win { color: #4ade80; } .loss { color: #f87171; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>DHARIK AI <span style="font-size: 12px;">V17.9 TG-LEV</span></h1>
        <div id="logic-mode" style="font-size: 11px; background: #ffcc00; color: #000; padding: 5px 15px; border-radius: 15px; font-weight: bold;">LEVEL AUTO-TRACKING ACTIVE</div>
    </div>

    <div class="prediction-card">
        <div id="next-id" style="color: #888; font-size: 14px;">Syncing...</div>
        <div id="pred-size" class="res-val">---</div>
        <div class="timer-bar"><div id="timer-fill" class="timer-fill"></div></div>
        <div id="timer-text" style="font-size: 12px; margin-top: 5px; color: #888;">--s</div>
    </div>

    <table class="history-list">
        <thead><tr><th>Period</th><th>Predict</th><th>Actual</th><th>Result</th></tr></thead>
        <tbody id="h-body"></tbody>
    </table>
</div>

<script>
    const API_URL = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
    const TG_TOKEN = "8685608225:AAH9_ncjvU38F3XxAlnXqbgmwqO7s0rIysU";
    const TG_CHAT_ID = "-1003558999419";

    let predictions = JSON.parse(localStorage.getItem('dharik_lev_preds')) || {};
    let currentLevel = 1;
    let lastProcessedPeriod = "";

    const levelSettings = {
        1: { amount: "$10", nextOnLoss: 2 },
        2: { amount: "$30", nextOnLoss: 3 },
        3: { amount: "$70", nextOnLoss: 1 } // Reset after 3
    };

    async function sendTelegram(msg) {
        const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;
        try { await fetch(url); } catch (e) { console.error("Telegram error"); }
    }

    async function updateSystem() {
        try {
            const response = await fetch(`${API_URL}?gameCode=WinGo_30S&timestamp=${Date.now()}`);
            const json = await response.json();
            const list = json.data.list;
            const lastPeriodData = list[0];
            const nextPeriod = (BigInt(lastPeriodData.issueNumber) + 1n).toString();

            // Check Win/Loss of previous prediction to update level & send sticker
            if (lastProcessedPeriod !== lastPeriodData.issueNumber) {
                const prevPredict = predictions[lastPeriodData.issueNumber];
                const actualResult = parseInt(lastPeriodData.number) >= 5 ? "BIG" : "SMALL";
                
                if (prevPredict && prevPredict !== "---") {
                    if (prevPredict === actualResult) {
                        await sendTelegram(`WIN 💸\n✅ Result: ${actualResult}`);
                        currentLevel = 1; // Reset to level 1 on Win
                    } else {
                        await sendTelegram(`LOSS 😓\n❌ Result: ${actualResult}`);
                        currentLevel = levelSettings[currentLevel].nextOnLoss;
                    }
                }
                lastProcessedPeriod = lastPeriodData.issueNumber;
            }

            // --- Your Original Logic ---
            const hist = list.slice(0, 10).map(i => parseInt(i.number) >= 5 ? "BIG" : "SMALL");
            const bigCount = hist.filter(x => x === "BIG").length;
            const smallCount = 10 - bigCount;
            let finalPredict = bigCount >= smallCount ? "BIG" : "SMALL";

            predictions[nextPeriod] = finalPredict;
            localStorage.setItem('dharik_lev_preds', JSON.stringify(predictions));

            document.getElementById('next-id').innerText = "Period: " + nextPeriod;
            document.getElementById('pred-size').innerText = finalPredict;
            document.getElementById('pred-size').className = "res-val " + finalPredict.toLowerCase();

            // Send Next Signal Message
            const signalMsg = `🚀 DHARIK AI SIGNAL 🚀\n\n📌 Period: ${nextPeriod}\n🎯 Prediction: ${finalPredict}\n💰 Strategy: LEVEL ${currentLevel}-${levelSettings[currentLevel].amount}`;
            await sendTelegram(signalMsg);

            renderHistory(list);
        } catch (e) { console.log("Sync error"); }
    }

    function renderHistory(list) {
        const hBody = document.getElementById('h-body');
        hBody.innerHTML = "";
        list.slice(0, 5).forEach(item => {
            const id = item.issueNumber;
            const actual = parseInt(item.number) >= 5 ? "BIG" : "SMALL";
            const predicted = predictions[id] || "---";
            const status = predicted === actual ? "<span class='win'>WIN</span>" : (predicted === "---" ? "---" : "<span class='loss'>LOSS</span>");
            hBody.innerHTML += `<tr><td>${id.slice(-4)}</td><td>${predicted}</td><td>${actual}</td><td>${status}</td></tr>`;
        });
    }

    function syncTimer() {
        const now = new Date();
        let remaining = 30 - (now.getSeconds() % 30);
        document.getElementById('timer-fill').style.width = (remaining / 30) * 100 + "%";
        document.getElementById('timer-text').innerText = remaining + "s";
        if (remaining === 30 && now.getMilliseconds() < 600) updateSystem();
    }

    updateSystem();
    setInterval(syncTimer, 500);
</script>
</body>
</html>
