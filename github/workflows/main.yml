name: Dharik AI 24/7
on:
  schedule:
    - cron: '*/5 * * * *' # Ovvoru 5 mins-kum auto-va run aagum
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run Signal Engine
        run: |
          node -e "const https = require('https'); https.get('https://dummypaper120-cmd.github.io/dharik-ai-bot/', (res) => { console.log('Signal Pushed'); });"
          
